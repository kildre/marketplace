include:
  - project: tenant/tekton-promotion-gitlab
    #file: routes/container-only.yml
    file: routes/helm-only.yml
    #file: routes/dragon-full.yml

stages:
  - '🧪 unit-test'
  - pipeline-trigger

workflow:
  rules:
    # keep your existing push → always / MR → never logic
    - if: $CI_PIPELINE_SOURCE == "push" && $CI_COMMIT_BRANCH != "main"
      when: always
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      when: never

    # only build & deploy your chart on non-HELM_ONLY runs
    - if: $HELM_ONLY == "false"
      variables:
        HELM_UPGRADE_EXTRA_ARGS: >-
          --set image.tag=${CI_COMMIT_SHA}
          --create-namespace
          --timeout 10m0s

    # only deploy your chart (no container build) on HELM_ONLY runs
    - if: $HELM_ONLY == "true"
      variables:
        HELM_UPGRADE_EXTRA_ARGS: >-
          --set image.tag=${IMAGE_TAG_FOR_HELM_ONLY}
          --create-namespace
          --timeout 10m0s

variables:
  HELM_ONLY:
    description: 'only build chart'
    value: 'true'
    options:
      - 'true'
      - 'false'
  IMAGE_TAG_FOR_HELM_ONLY:
    description: 'Image tag you want to use for only a helm config deploy (most likely your last commit sha on main)'
    value: 'a302cb2a257fb23a1321e6091f712bdfd7523dec' # ${CI_COMMIT_SHA}
  CONTAINER_ONLY:
    description: 'only build container'
    value: 'false'
    options:
      - 'true'
      - 'false'
  UPSTREAM_PROJECT_DIR: '.'
  HELM_RELEASE_NAME: 'advana-marketplace'
  HELM_CHART_DIR: './chart'
  DOCKERFILE_PATH: './Dockerfile'
