    file: routes/dragon-full.yml

workflow:
  rules:
   - if: $CI_PIPELINE_SOURCE == "push" # && $CI_COMMIT_BRANCH != $CI_DEFAULT_BRANCH || $CI_JOB_MANUAL = true
     when: always
   - if: $CI_PIPELINE_SOURCE == "merge_request_event"
     when: never

