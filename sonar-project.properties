# SonarQube Configuration
sonar.sourceEncoding=UTF-8

# SonarQube server
sonar.host.url=https://sonarqube.cdao.us
sonar.projectKey=tenant-metrostar-advana-marketplace
sonar.projectName=Advana Marketplace
sonar.projectVersion=1.0.0
sonar.organization=CDAO

# Branch configuration (set to main for default branch analysis)
sonar.branch.name=main

# Project structure - only analyze source code, not tests
sonar.sources=frontend/src
sonar.tests=frontend/src

# Test file patterns
sonar.test.inclusions=**/*.test.tsx,**/*.test.ts,**/*.spec.tsx,**/*.spec.ts

# Exclude patterns from main source analysis
sonar.exclusions=**/node_modules/**,**/coverage/**,**/dist/**,**/build/**,**/*.test.tsx,**/*.test.ts,**/*.spec.tsx,**/*.spec.ts

# TypeScript configuration
sonar.typescript.tsconfigPath=frontend/tsconfig.json

# Coverage report path
sonar.javascript.lcov.reportPaths=frontend/coverage/lcov.info
sonar.typescript.lcov.reportPaths=frontend/coverage/lcov.info

# Coverage exclusions
sonar.coverage.exclusions=**/*.test.ts,**/*.test.tsx,**/*.spec.ts,**/*.spec.tsx,**/*.config.ts,**/*.config.js,**/vite.config.ts

# Analysis cache & SCM (already set by your pipeline, but explicit here)
sonar.analysisCache.enabled=false
sonar.scm.disabled=true
