name: advana-marketplace

services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.local
      args:
        VITE_API_BASE_URL: "${VITE_API_BASE_URL:-}"
    image: advana-marketplace-frontend:local
    ports:
      - "8080:8080"
    environment:
      APP_UID: 65532
      APP_GID: 65532
      REACT_APP_ENV: "local"
      REACT_APP_LOG_LEVEL: "debug"
    healthcheck:
      test: ["CMD-SHELL", "nginx -t >/dev/null 2>&1"]
      interval: 30s
      timeout: 3s
      start_period: 5s
      retries: 3
    restart: unless-stopped
networks:
  default:
    driver: bridge
