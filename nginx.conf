server {
    listen 8080;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Request size and buffer limits to prevent overflow attacks
    client_max_body_size 10m;
    client_body_buffer_size 128k;
    
    # Timeout protections against slowloris attacks
    client_body_timeout 12;
    client_header_timeout 12;
    send_timeout 10;

    # Handle client-side routing for SPA
    location / {
        try_files $uri $uri/ /index.html;
    }    
    
    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    # Content Security Policy - Prevent token/session data from being sent to external sites
    # Note: unsafe-inline and unsafe-eval are required for Vite/React development builds
    # TODO: Review for STIG compliance - consider using nonces/hashes instead of unsafe-inline
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self' https://keycloak.cdao.us https://*.cdao.us; frame-ancestors 'self';" always;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/xml+rss application/json;

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
